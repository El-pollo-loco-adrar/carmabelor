name: Déploiement vers OVH
on:
    push:
        branches:
            - main

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        steps:
        -   name: 🚚 Récupération du code
            uses: actions/checkout@v4

        -   name: ⚙️ Installation de Node.js
            uses: actions/setup-node@v4
            with:
                node-version: 20
                cache: 'npm'

        -   name: 📦 Installation des dépendances
            run: npm install

        -   name: 🏗️ Build du projet Astro
            run: npm run build

        -   name: 🚀 Transfert FTP vers OVH
            uses: SamKirkland/FTP-Deploy-Action@v4.3.5
            with:
                server: ${{ secrets.FTP_SERVER }}
                username: ${{ secrets.FTP_USERNAME }}
                password: ${{ secrets.FTP_PASSWORD }}
                local-dir: ./dist/      # On envoie le dossier généré par Astro
                server-dir: ./www/      # Le dossier de destination sur OVH
                dangerous-clean-slate: false